name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build (for example, v1.1.3)
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate release configuration
        shell: pwsh
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($env:RELEASE_TAG -ne "v$version") {
            throw "Tag $env:RELEASE_TAG does not match package version v$version."
          }
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_KEY)) {
            throw 'TAURI_SIGNING_PRIVATE_KEY is not configured.'
          }
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_PASSWORD)) {
            throw 'TAURI_SIGNING_PRIVATE_KEY_PASSWORD is not configured.'
          }

      - name: Build and publish Windows installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'NAIS2-Forge ${{ inputs.tag }}'
          releaseBody: 'See the release notes and assets for this version.'
          releaseDraft: false
          prerelease: false
